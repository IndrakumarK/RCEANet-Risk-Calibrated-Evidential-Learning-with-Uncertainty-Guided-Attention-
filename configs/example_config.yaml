# Dataset paths
train_dir: data/train
val_dir: data/val
test_dir: data/test

# Model
backbone: efficientnet_b3
num_classes: 4

# Training
batch_size: 16
learning_rate: 0.0001
weight_decay: 0.00001
epochs: 50
seed: 42

# Loss weights
lambda_kl: 0.001
lambda_calib: 0.1
lambda_au: 0.1